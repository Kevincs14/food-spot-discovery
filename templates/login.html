<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  </head>
  <body class="container mt-5" style="max-width: 480px;">
    <nav class="mb-4">
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">Search</a>
      <a href="{{ url_for('spots') }}" class="btn btn-outline-secondary btn-sm">All Spots</a>
      <a href="{{ url_for('login') }}" class="btn btn-outline-secondary btn-sm">Login</a>
      <a href="{{ url_for('register') }}" class="btn btn-outline-secondary btn-sm">Register</a>
    </nav>

    <h1 class="mb-4">Login</h1>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
      <a href="{{ url_for('register') }}" class="btn btn-link">Create an account</a>
    </form>
  </body>
</html>
