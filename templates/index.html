<!doctype html>
<html>
  <head>
    <title>Food Spot Discovery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  </head>
  <body class="container mt-5">
    <nav class="mb-4">
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">Search</a>
      <a href="{{ url_for('spots') }}" class="btn btn-outline-secondary btn-sm">All Spots</a>
      <a href="{{ url_for('register') }}" class="btn btn-outline-secondary btn-sm">Register</a>
    </nav>

    <h1 class="mb-4">Food Spot Search</h1>

    <form method="POST" class="input-group mb-3">
      <input
        type="text"
        name="search"
        class="form-control"
        placeholder="Search for a restaurant..."
        value="{{ search_query }}"
      />
      <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <hr />

    <h3>Results:</h3>
    <ul class="list-group">
      {% for spot in results %}
      <li class="list-group-item">
        <a href="{{ url_for('spot_detail', spot_id=spot[0]) }}"><strong>{{ spot[1] }}</strong></a><br />
        <small class="text-muted">{{ spot[2] }}</small>
      </li>
      {% else %}
        {% if search_query %}
        <p>No spots found for "{{ search_query }}".</p>
        {% endif %}
      {% endfor %}
    </ul>
  </body>
</html>
