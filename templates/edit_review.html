<!doctype html>
<html>
  <head>
    <title>Edit Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  </head>
  <body class="container mt-5" style="max-width: 480px;">
    <h1 class="mb-4">Edit Review</h1>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Rating (1-5)</label>
        <input type="number" name="rating" class="form-control" min="1" max="5" value="{{ review[1] }}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Comment</label>
        <textarea name="comment" id="comment" class="form-control" rows="3" maxlength="1000">{{ review[2] if review[2] else '' }}</textarea>
        <div class="form-text"><span id="comment-count">0</span>/1000 characters</div>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary">Cancel</a>
    </form>
    <script>
      const ta = document.getElementById('comment');
      const counter = document.getElementById('comment-count');
      const update = () => {
        const len = ta.value.length;
        counter.textContent = len;
        counter.classList.toggle('text-danger', len >= 1000);
      };
      ta.addEventListener('input', update);
      update();
    </script>
  </body>
</html>
